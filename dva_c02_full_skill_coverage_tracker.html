const SK = 'dva_full_v3';

function load() {
  try {
    let curr = JSON.parse(localStorage.getItem(SK));
    if (curr) return curr;
    
    let old = JSON.parse(localStorage.getItem('dva_full_v2') || '{}');
    let st = {};
    for (let k in old) {
      if (old[k] === true) {
        st[k] = { status: 'done', start: Date.now() - 3600000, end: Date.now(), timeSpent: 3600000 };
      }
    }
    return st;
  } catch { return {}; }
}
function save(s) { try { localStorage.setItem(SK, JSON.stringify(s)); } catch{} }

let ST = load();
let CF = 'all';

let META = JSON.parse(localStorage.getItem(SK+'_meta') || '{"focusTime":0, "streak":0, "lastDate":null, "startedCount":0, "timePlanning":0, "timeCoding":0, "timeTesting":0}');
function saveMeta() { localStorage.setItem(SK+'_meta', JSON.stringify(META)); }


function pauseStage(id) {
  let s = ST[id];
  if (!s || s.isPaused || !s.lastStageStart) return;
  let now = Date.now();
  let spentInStage = now - s.lastStageStart;
  s.stages[s.status] = (s.stages[s.status] || 0) + spentInStage;
  
  if(s.status === 'planning') META.timePlanning += spentInStage;
  if(s.status === 'coding') META.timeCoding += spentInStage;
  if(s.status === 'testing') META.timeTesting += spentInStage;
  META.focusTime += spentInStage;
  
  s.lastStageStart = null;
  s.isPaused = true;
  save(ST);
  saveMeta();
  render();
}

function resumeStage(id) {
  let s = ST[id];
  if (!s || !s.isPaused) return;
  s.lastStageStart = Date.now();
  s.isPaused = false;
  save(ST);
  render();
}

// Lifecycle mapping

const STAGES = ['todo', 'planning', 'coding', 'testing', 'done'];

function updateStatus(id, stat, title) {
  if (!ST[id]) ST[id] = { status: 'todo', stages: { planning:0, coding:0, testing:0 }, lastStageStart: null, start: null, end: null, timeSpent: 0 };
  let s = ST[id];
  let now = Date.now();
  
  // ensure new structure is present for migrated tasks
  if(!s.stages) s.stages = { planning:0, coding:0, testing:0 };
  
  const projEl = document.getElementById('proj-' + id);
  let prevStat = s.status;
  
  // Accumulate time for previous stage if any
  if (prevStat !== 'todo' && prevStat !== 'done' && !s.isPaused && s.lastStageStart) {
      let spentInStage = now - s.lastStageStart;
      s.stages[prevStat] = (s.stages[prevStat] || 0) + spentInStage;
      
      // Add to global meta
      if(prevStat === 'planning') META.timePlanning += spentInStage;
      if(prevStat === 'coding') META.timeCoding += spentInStage;
      if(prevStat === 'testing') META.timeTesting += spentInStage;
      META.focusTime += spentInStage;
  }

  s.status = stat;
  s.isPaused = false;
  s.lastStageStart = now;

  if (stat === 'planning') {
    if (!s.start) {
      s.start = now;
      META.startedCount = (META.startedCount || 0) + 1;
    }
    if(projEl) playAnim(projEl, 'anim-start');
  } 
  else if (stat === 'coding' || stat === 'testing') {
      if(projEl) playAnim(projEl, 'anim-start');
  }
  else if (stat === 'done') {
      s.end = now;
      s.timeSpent = Object.values(s.stages).reduce((a,b)=>a+b, 0) || (now - (s.start || now));
      
      let today = new Date().toDateString();
      if (META.lastDate !== today) {
        META.streak += 1;
        META.lastDate = today;
      }
      
      if(projEl) playAnim(projEl, 'anim-complete');
      showAchievement("Quest Complete!", title || "Skill acquired.");
      fireConfetti();
  } else if (stat === 'todo') {
      delete ST[id];
  }
  
  save(ST);
  saveMeta();
  
  if(stat === 'todo' || !projEl) {
    render();
  } else {
    setTimeout(() => render(), 800);
  }
}

// Timer logic
setInterval(() => {
    let now = Date.now();
    document.querySelectorAll('[data-timer]').forEach(el => {
        let id = el.getAttribute('data-id');
        let stage = el.getAttribute('data-timer');
        let s = ST[id];
        if(s && s.status === stage && s.lastStageStart) {
            let activeMs = now - s.lastStageStart;
            let totalMs = (s.stages[stage] || 0) + activeMs;
            let mins = Math.floor(totalMs / 60000);
            let secs = Math.floor((totalMs % 60000) / 1000);
            el.innerHTML = `⏱️ ${mins}m ${secs}s`;
        }
    });
}, 1000);


function playAnim(el, animClass) {
  el.classList.add(animClass);
  setTimeout(() => { el.classList.remove(animClass); }, 1000);
}

function showAchievement(msg, sub) {
  let ach = document.getElementById('achievement');
  if(!ach) {
    ach = document.createElement('div');
    ach.id = 'achievement';
    ach.className = 'achievement';
    document.body.appendChild(ach);
  }
  ach.innerHTML = `<div class="ach-icon">🌟</div><div><div class="ach-text">${msg}</div><div class="ach-sub">${sub}</div></div>`;
  
  void ach.offsetWidth; // trigger reflow
  ach.classList.add('show');
  setTimeout(() => ach.classList.remove('show'), 4000);
}

function fireConfetti() {
  const colors = ['#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ef4444', '#fff'];
  for (let i = 0; i < 70; i++) {
    let conf = document.createElement('div');
    conf.style.position = 'fixed';
    let size = Math.random() * 8 + 6;
    conf.style.width = size + 'px';
    conf.style.height = size + 'px';
    conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    
    let startX = window.innerWidth / 2;
    let startY = window.innerHeight;
    conf.style.left = startX + 'px';
    conf.style.top = startY + 'px';
    conf.style.zIndex = '9999';
    conf.style.pointerEvents = 'none';
    conf.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    
    document.body.appendChild(conf);
    
    let angle = (Math.random() * Math.PI) - Math.PI; 
    let velocity = Math.random() * 25 + 15;
    let dx = Math.cos(angle) * velocity;
    let dy = Math.sin(angle) * velocity;
    let gravity = 0.6;
    
    let x = startX;
    let y = startY;
    let t = 0;
    let anim = setInterval(() => {
      x += dx;
      y += dy;
      dy += gravity;
      t++;
      conf.style.left = x + 'px';
      conf.style.top = y + 'px';
      conf.style.transform = `rotate(${t * 15}deg)`;
      
      if (y > window.innerHeight + 100) {
        clearInterval(anim);
        conf.remove();
      }
    }, 20);
  }
}

function exportData() {
  const data = { ST, META };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'dva_c02_savegame.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showAchievement("Game Saved!", "Metrics successfully exported.");
}

function importData(event) {
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if(data.ST && data.META) {
        ST = data.ST;
        META = data.META;
        save(ST);
        saveMeta();
        render();
        showAchievement("Game Loaded!", "Welcome back, architect.");
      } else {
        alert("Invalid save file format.");
      }
    } catch(err) {
      alert("Error reading save file.");
    }
  };
  reader.readAsText(file);
}

function filt(f, el) {
  CF = f;
  document.querySelectorAll('.fb').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  render();
}

function resetAll() {
  if (confirm('Are you sure you want to reset all progress and metrics?')) {
    ST = {};
    META = {focusTime:0, streak:0, lastDate:null, startedCount:0, timePlanning:0, timeCoding:0, timeTesting:0};
    save(ST);
    saveMeta();
    render();
  }
}

function toggleDomain(id) {
  const l = document.getElementById('dlist-'+id);
  const c = document.getElementById('dchev-'+id);
  const open = l.style.display !== 'none';
  l.style.display = open ? 'none' : '';
  c.classList.toggle('open', !open);
}

function formatTime(ms) {
  if (!ms) return '0h 0m';
  let mins = Math.floor(ms / 60000);
  let hrs = Math.floor(mins / 60);
  mins = mins % 60;
  return `${hrs}h ${mins}m`;
}
function formatDate(ts) {
  if (!ts) return 'N/A';
  return new Date(ts).toLocaleString([], { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
}

function render() {
  const allP = DATA.flatMap(d => d.tasks.flatMap(t => t.projects));
  const total = allP.length;
  
  let doneCount = 0;
  let progressCount = 0;
  let skillsHit = new Set();
  
  allP.forEach(p => {
    let st = ST[p.id];
    if (st && st.status === 'done') { doneCount++; skillsHit.add(p.skill); }
    if (st && st.status !== 'todo' && st.status !== 'done') { progressCount++; }
  });

  const completionPct = total === 0 ? 0 : Math.round((doneCount / total) * 100);
  const discipline = META.startedCount ? Math.round((doneCount / META.startedCount) * 100) : 0;
  
  // Behavior Analysis Archetype
  let tP = META.timePlanning || 0;
  let tC = META.timeCoding || 0;
  let tT = META.timeTesting || 0;
  let totalSDE = tP + tC + tT || 1; // avoid / 0
  let archetype = "Initiate your journey";
  if(tC > tP && tC > tT) archetype = "The Fast Coder (Bias for Action)";
  else if (tP > tC) archetype = "The Meticulous Planner";
  else if (tT > tC) archetype = "The Quality Enforcer (Testing heavy)";

  // Render Dashboard
  const dashHTML = `
    <div class="dashboard-grid">
      <div class="metric-card m-blue">
        <div class="m-title">Project Lifecycle</div>
        <div class="m-value">${doneCount} <span style="font-size:1.2rem;color:var(--text-tertiary)">/ ${total}</span></div>
        <div class="m-desc">${progressCount} active · ${total - doneCount - progressCount} queued</div>
      </div>
      <div class="metric-card m-purple">
        <div class="m-title">SDE Behavior Analysis</div>
        <div class="m-value" style="font-size:1.5rem;">${Math.round(tP/totalSDE*100)}% <span style="font-size:1rem;color:var(--text-tertiary)">Plan</span> · ${Math.round(tC/totalSDE*100)}% <span style="font-size:1rem;color:var(--text-tertiary)">Code</span></div>
        <div class="m-desc">Archetype: <strong>${archetype}</strong></div>
      </div>
      <div class="metric-card m-green">
        <div class="m-title">Consistency Streak</div>
        <div class="m-value">${META.streak} <span style="font-size:1.2rem;color:var(--text-tertiary)">days</span></div>
        <div class="m-desc">Consecutive days of completing tasks</div>
      </div>
      <div class="metric-card m-yellow">
        <div class="m-title">Deep Focus (All Stages)</div>
        <div class="m-value">${formatTime(META.focusTime)}</div>
        <div class="m-desc">Total time invested in hands-on building</div>
      </div>
    </div>
  `;
  document.getElementById('dashboard-root').innerHTML = dashHTML;

  // Render Projects
  const root = document.getElementById('root');
  root.innerHTML = '';
  
  DATA.forEach(d => {
    const dProjs = d.tasks.flatMap(t => t.projects);
    const dDone = dProjs.filter(p => ST[p.id] && ST[p.id].status === 'done').length;
    const pct = Math.round((dDone / dProjs.length) * 100);

    const tasksHTML = d.tasks.map(t => {
      let projs = t.projects.filter(p => {
        let st = ST[p.id] ? ST[p.id].status : 'todo';
        if (CF === 'todo') return st === 'todo';
        if (CF === 'progress') return st !== 'todo' && st !== 'done';
        if (CF === 'done') return st === 'done';
        if (CF === 'hard') return p.diff === 'h' && st !== 'done';
        return true;
      });
      
      const projsHTML = projs.length ? projs.map(p => {
        let st = ST[p.id] || { status: 'todo', stages: {} };
        let sClass = st.status === 'done' ? ' s-done' : (st.status !== 'todo' ? ' s-progress' : '');
        
        let metaHtml = '';
        if (st.status !== 'todo') {
           metaHtml = `<div class="pmeta">`;
           if (st.start) metaHtml += `<span><strong>Started:</strong> ${formatDate(st.start)}</span>`;
           
           if (st.status === 'planning' || st.status === 'coding' || st.status === 'testing') {
              let timerClass = 't-' + st.status;
              if (st.isPaused) {
                  let totalMs = st.stages[st.status] || 0;
                  let mins = Math.floor(totalMs / 60000);
                  let secs = Math.floor((totalMs % 60000) / 1000);
                  metaHtml += `<span class="live-timer paused ${timerClass}">⏱️ ${mins}m ${secs}s (Paused)</span>`;
              } else {
                  metaHtml += `<span class="live-timer ${timerClass}" data-timer="${st.status}" data-id="${p.id}">⏱️ 0m 0s</span>`;
              }
           }
           
           if (st.end) metaHtml += `<span><strong>Completed:</strong> ${formatDate(st.end)}</span>`;
           if (st.timeSpent) metaHtml += `<span><strong>Total Focus:</strong> ${formatTime(st.timeSpent)}</span>`;
           metaHtml += `</div>`;
        }

        // Render Action Buttons
        let btnHtml = '';
        if (st.status === 'todo') {
            btnHtml += `<button class="btn-act btn-start" onclick="updateStatus('${p.id}', 'planning', \`${p.title}\`)">Start Planning</button>`;
        } else {
            if (st.status !== 'done') {
                if (st.isPaused) {
                    btnHtml += `<button class="btn-act btn-resume" onclick="resumeStage('${p.id}')">Resume</button>`;
                } else {
                    btnHtml += `<button class="btn-act btn-break" onclick="pauseStage('${p.id}')">Take a Break</button>`;
                }
            }
            if (st.status === 'planning') btnHtml += `<button class="btn-act btn-plan" onclick="updateStatus('${p.id}', 'coding', \`${p.title}\`)">Move to Coding</button>`;
            if (st.status === 'coding') btnHtml += `<button class="btn-act btn-code" onclick="updateStatus('${p.id}', 'testing', \`${p.title}\`)">Move to Testing</button>`;
            if (st.status === 'testing') btnHtml += `<button class="btn-act btn-test" onclick="updateStatus('${p.id}', 'done', \`${p.title}\`)">Complete Project</button>`;
            btnHtml += `<button class="btn-act btn-reset" onclick="updateStatus('${p.id}', 'todo', \`${p.title}\`)">Reset</button>`;
        }

        // Render Stage Bar
        let stagesBar = '';
        if (st.status !== 'todo') {
            const actI = ['todo','planning','coding','testing','done'].indexOf(st.status);
            stagesBar = `<div class="stage-bar">
                <div class="stage ${actI>1?'done':actI===1?'active':''}"><div class="stage-fill"></div></div>
                <div class="stage ${actI>2?'done':actI===2?'active':''}"><div class="stage-fill"></div></div>
                <div class="stage ${actI>3?'done':actI===3?'active':''}"><div class="stage-fill"></div></div>
                <div class="stage ${actI===4?'done':''}"><div class="stage-fill"></div></div>
            </div>`;
        }

        return `
        <div class="proj${sClass}" id="proj-${p.id}">
          <div class="p-actions">
            ${btnHtml}
          </div>
          <div class="pbody">
            <div class="prow">
              <span class="ptitle">${p.title}</span>
              <span class="skill-tag">${p.skill}</span>
              <span class="diff ${p.diff}">${p.diff === 'e' ? 'easy' : p.diff === 'm' ? 'medium' : 'hard'}</span>
            </div>
            <div class="pdesc">${p.desc}</div>
            <div class="psvc">AWS Services: ${p.svc}</div>
            ${metaHtml}
            ${stagesBar}
          </div>
        </div>`;
      }).join('') : '';
      
      return projsHTML ? `<div class="task-group"><div class="tg-header">${t.name}</div>${projsHTML}</div>` : '';
    }).join('');

    if (tasksHTML.trim() === '') return; // Hide empty domains based on filter

    const el = document.createElement('div');
    el.className = `domain ${d.cls}`;
    el.innerHTML = `
      <div class="dhead" onclick="toggleDomain('${d.id}')">
        <span class="dtag">${d.tag}</span>
        <span class="dtitle">${d.title}</span>
        <span class="dprog">${dDone} / ${dProjs.length}</span>
        <div class="dchev open" id="dchev-${d.id}">▼</div>
      </div>
      <div class="pbar-wrap"><div class="pbar" style="width:${pct}%"></div></div>
      <div id="dlist-${d.id}">${tasksHTML}</div>`;
    root.appendChild(el);
  });
  
  if(root.innerHTML === '') {
    root.innerHTML = '<div class="empty">No projects match this filter.</div>';
  }
}
render();

</script>
