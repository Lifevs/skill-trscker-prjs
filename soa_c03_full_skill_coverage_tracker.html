const SK='soa_c03_v1';
function load(){try{return JSON.parse(localStorage.getItem(SK)||'{}')}catch{return{}}}
function save(s){try{localStorage.setItem(SK,JSON.stringify(s))}catch{}}
let ST=load();
let CF='all';

function toggle(id){ST[id]=!ST[id];save(ST);render()}
function filt(f,el){CF=f;document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));el.classList.add('on');render()}
function resetAll(){if(confirm('Reset all progress?')){ST={};save(ST);render();}}
function toggleDomain(id){
  const l=document.getElementById('dl-'+id);
  const c=document.getElementById('dc-'+id);
  const open=l.style.display!=='none';
  l.style.display=open?'none':'';
  c.classList.toggle('open',!open);
}

function render(){
  const all=DATA.flatMap(d=>d.tasks.flatMap(t=>t.projects));
  const total=all.length;
  const done=all.filter(p=>ST[p.id]).length;
  const hardLeft=all.filter(p=>p.diff==='h'&&!ST[p.id]).length;
  const skillsDone=new Set(all.filter(p=>ST[p.id]).map(p=>p.sk)).size;
  document.getElementById('sT').textContent=total;
  document.getElementById('sD').textContent=done;
  document.getElementById('sP').textContent=Math.round(done/total*100)+'%';
  document.getElementById('sH').textContent=hardLeft;
  document.getElementById('sK').textContent=skillsDone+'/'+all.length;

  const root=document.getElementById('root');
  root.innerHTML='';
  DATA.forEach(d=>{
    const dP=d.tasks.flatMap(t=>t.projects);
    const dD=dP.filter(p=>ST[p.id]).length;
    const pct=Math.round(dD/dP.length*100);

    const tasksHTML=d.tasks.map(t=>{
      let projs=t.projects;
      if(CF==='todo') projs=projs.filter(p=>!ST[p.id]);
      if(CF==='done') projs=projs.filter(p=>ST[p.id]);
      if(CF==='hard') projs=projs.filter(p=>p.diff==='h'&&!ST[p.id]);
      const pH=projs.length?projs.map(p=>`
        <div class="pj${ST[p.id]?' dn':''}">
          <button class="cb${ST[p.id]?' on':''}" onclick="toggle('${p.id}')" aria-label="${ST[p.id]?'Uncheck':'Check'}: ${p.title}">
            <i class="ti ti-check" aria-hidden="true"></i>
          </button>
          <div class="pb2">
            <div class="pr">
              <span class="pt">${p.title}</span>
              <span class="sk">${p.sk}</span>
              <span class="df ${p.diff}">${p.diff==='e'?'easy':p.diff==='m'?'medium':'hard'}</span>
            </div>
            <div class="pd">${p.desc}</div>
            <div class="ps"><i class="ti ti-cloud" aria-hidden="true"></i>${p.svc}</div>
          </div>
        </div>`).join(''):'<div class="em">No projects match this filter.</div>';
      return`<div class="tg"><div class="tgh">${t.name}</div>${pH}</div>`;
    }).join('');

    const el=document.createElement('div');
    el.className=`dm ${d.cls}`;
    el.innerHTML=`
      <div class="dh" onclick="toggleDomain('${d.id}')">
        <span class="dtg">${d.tag}</span>
        <span class="dti">${d.title}</span>
        <span class="dpr">${dD}/${dP.length}</span>
        <i class="ti ti-chevron-down dch open" id="dc-${d.id}" aria-hidden="true"></i>
      </div>
      <div class="pb"><div class="pbi" style="width:${pct}%"></div></div>
      <div id="dl-${d.id}">${tasksHTML}</div>`;
    root.appendChild(el);
  });
}
render();
</script>
